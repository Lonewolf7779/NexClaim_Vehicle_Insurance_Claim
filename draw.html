<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NexClaim Sequence Diagram</title>

<style>

body{
background:#eef4f9;
font-family:Segoe UI;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

svg{
background:white;
border-radius:14px;
box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

.title{
font-size:22px;
font-weight:700;
fill:#2c3e50;
}

.actor{
fill:#4dabf7;
stroke:#1c7ed6;
stroke-width:2;
}

.server{
fill:#51cf66;
stroke:#2f9e44;
stroke-width:2;
}

.database{
fill:#ff8787;
stroke:#e03131;
stroke-width:2;
}

.text{
font-size:12px;
text-anchor:middle;
fill:#2c3e50;
}

.line{
stroke:#555;
stroke-dasharray:6;
}

.arrow{
stroke:#333;
stroke-width:2;
marker-end:url(#arrow);
}

</style>

</head>

<body>

<svg width="1100" height="650">

<defs>
<marker id="arrow" markerWidth="10" markerHeight="7"
refX="10" refY="3.5" orient="auto">
<polygon points="0 0,10 3.5,0 7" fill="#333"/>
</marker>
</defs>

<text x="550" y="40" class="title" text-anchor="middle">
Sequence Diagram – NexClaim Claim Processing Workflow
</text>

<!-- ACTORS -->

<rect x="60" y="80" width="120" height="40" class="actor"/>
<text x="120" y="105" class="text">Customer</text>

<rect x="250" y="80" width="140" height="40" class="actor"/>
<text x="320" y="105" class="text">React Frontend</text>

<rect x="460" y="80" width="140" height="40" class="server"/>
<text x="530" y="105" class="text">FastAPI Backend</text>

<rect x="670" y="80" width="150" height="40" class="server"/>
<text x="745" y="105" class="text">Validation Engine</text>

<rect x="900" y="80" width="140" height="40" class="database"/>
<text x="970" y="105" class="text">SQLite DB</text>

<!-- LIFELINES -->

<line x1="120" y1="120" x2="120" y2="600" class="line"/>
<line x1="320" y1="120" x2="320" y2="600" class="line"/>
<line x1="530" y1="120" x2="530" y2="600" class="line"/>
<line x1="745" y1="120" x2="745" y2="600" class="line"/>
<line x1="970" y1="120" x2="970" y2="600" class="line"/>

<!-- SEQUENCE -->

<line x1="120" y1="160" x2="320" y2="160" class="arrow"/>
<text x="220" y="150" class="text">Submit Claim</text>

<line x1="320" y1="200" x2="530" y2="200" class="arrow"/>
<text x="420" y="190" class="text">POST /claims</text>

<line x1="530" y1="240" x2="970" y2="240" class="arrow"/>
<text x="750" y="230" class="text">Create Claim Record</text>

<line x1="970" y1="280" x2="530" y2="280" class="arrow"/>
<text x="750" y="270" class="text">Return Claim ID</text>

<line x1="320" y1="320" x2="530" y2="320" class="arrow"/>
<text x="420" y="310" class="text">Upload Documents</text>

<line x1="530" y1="360" x2="745" y2="360" class="arrow"/>
<text x="640" y="350" class="text">Run Validation</text>

<line x1="745" y1="400" x2="970" y2="400" class="arrow"/>
<text x="860" y="390" class="text">Store Validation Result</text>

<line x1="745" y1="440" x2="530" y2="440" class="arrow"/>
<text x="640" y="430" class="text">Return Validation Status</text>

<line x1="530" y1="480" x2="970" y2="480" class="arrow"/>
<text x="750" y="470" class="text">Update Claim Status</text>

<line x1="530" y1="520" x2="320" y2="520" class="arrow"/>
<text x="420" y="510" class="text">Send Claim Result</text>

<line x1="320" y1="560" x2="120" y2="560" class="arrow"/>
<text x="220" y="550" class="text">Display Claim Status</text>

</svg>

</body>
</html>
